{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión · Iniciar sesión</title>
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'img/logo.png' %}">
</head>
<body>

<main class="login-page">
    <!-- ── Zona central ───────────────────────────────────── -->
    <div class="login-main">

        <!-- Título -->
        <h1 class="login-heading">Iniciar sesión</h1>

        <!-- Tarjeta del formulario -->
        <div class="login-card">

            {% if messages %}
                {% for message in messages %}
                <div class="login-error" role="alert">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 1a7 7 0 1 1 0 14A7 7 0 0 1 8 1zm0 1.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11zm-.75 3.25h1.5v4h-1.5v-4zm0 5h1.5v1.5h-1.5v-1.5z"/>
                    </svg>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'gestion:login' %}" novalidate>
                {% csrf_token %}

                <!-- Usuario -->
                <div class="login-field">
                    <label class="login-label" for="username">Usuario</label>
                    <input
                        class="login-input"
                        type="text"
                        id="username"
                        name="username"
                        placeholder="nombre de usuario"
                        autocomplete="username"
                        autocapitalize="none"
                        spellcheck="false"
                        required
                        autofocus
                        value="{{ request.POST.username }}">
                </div>

                <!-- Contraseña -->
                <div class="login-field">
                    <label class="login-label" for="password">Contraseña</label>
                    <input
                        class="login-input"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required>
                </div>

                <button class="login-submit" type="submit">Ingresar</button>
            </form>

        </div><!-- /.login-card -->

        <!-- Tarjeta soporte -->
        <div class="login-footer-card">
            ¿Problemas para acceder?&nbsp;
            <a href="mailto:soporte@ejemplo.cl">Contactar a soporte TI</a>
        </div>

    </div><!-- /.login-main -->

    <!-- ── Footer inferior ────────────────────────────────── -->
    <footer class="login-bottom">
        <div class="login-bottom-left">
            <span>Inicio administracion</span>
        </div>

        <div class="login-bottom-right">
            <span>Sistema de Gestión</span>
            <span class="sep">·</span>
            <span>© {% now "Y" %}</span>
        </div>
    </footer>

</main>
</body>
</html>
